services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

  backend:
    build: ./backend
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: 4000
      DATABASE_PATH: /app/data/document-audits.sqlite
      CLIENT_ORIGIN: "${CLIENT_ORIGIN:?Set CLIENT_ORIGIN to the public HTTPS origin}"
      APP_BASE_URL: "${APP_BASE_URL:?Set APP_BASE_URL to the public HTTPS URL}"
      AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET to a unique value with at least 32 characters}"
      AUTH_TOKEN_TTL_MINUTES: "${AUTH_TOKEN_TTL_MINUTES:-480}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      JSON_BODY_LIMIT: "${JSON_BODY_LIMIT:-100kb}"
      MAIL_HOST: "${MAIL_HOST:-mail.mohren.net}"
      MAIL_PORT: "${MAIL_PORT:-25}"
      MAIL_USER: "${MAIL_USER:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-DocAudit <docaudit@mohren.net>}"
      MAIL_SECURE: "${MAIL_SECURE:-false}"
      MAIL_IGNORE_TLS: "${MAIL_IGNORE_TLS:-false}"
      MAIL_REQUIRE_TLS: "${MAIL_REQUIRE_TLS:-false}"
      MAIL_TLS_REJECT_UNAUTHORIZED: "${MAIL_TLS_REJECT_UNAUTHORIZED:-true}"
      MAIL_TLS_SERVERNAME: "${MAIL_TLS_SERVERNAME:-}"
      MAIL_TLS_CA_FILE: "${MAIL_TLS_CA_FILE:-}"
      MAIL_CONNECTION_TIMEOUT_MS: "${MAIL_CONNECTION_TIMEOUT_MS:-10000}"
      MAIL_DRY_RUN: "${MAIL_DRY_RUN:-false}"
      NOTIFICATIONS_ENABLED: "true"
      NOTIFICATION_CHECK_INTERVAL_MINUTES: 60
    volumes:
      - audit-data:/app/data
      - ./certs:/certs:ro

  frontend:
    build: ./frontend
    depends_on:
      - backend

volumes:
  audit-data:
