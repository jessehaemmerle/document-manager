services:
  db:
    image: postgres:16-alpine
    container_name: document-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: document-manager-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      POSTGRES_HOST: db
      DB_SYNC: "true"
    ports:
      - "14000:4000"
    depends_on:
      - db

  seed:
    build:
      context: ./backend
    container_name: document-manager-seed
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DB_SYNC: "true"
    command: ["npm", "run", "seed"]
    depends_on:
      - db
    restart: "no"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: document-manager-frontend
    restart: unless-stopped
    ports:
      - "18080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
