services:
  backend:
    build: ./backend
    environment:
      PORT: 4000
      DATABASE_PATH: /app/data/document-audits.sqlite
      CLIENT_ORIGIN: http://localhost:8080
      APP_BASE_URL: http://localhost:8080
      AUTH_SECRET: change-this-for-production
      MAIL_HOST: mail.mohren.net
      MAIL_PORT: 25
      MAIL_FROM: "DocAudit <docaudit@mohren.net>"
      MAIL_SECURE: "false"
      MAIL_IGNORE_TLS: "false"
      MAIL_REQUIRE_TLS: "false"
      MAIL_TLS_REJECT_UNAUTHORIZED: "true"
      MAIL_DRY_RUN: "false"
      NOTIFICATIONS_ENABLED: "true"
      NOTIFICATION_CHECK_INTERVAL_MINUTES: 60
    volumes:
      - audit-data:/app/data
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  audit-data:
