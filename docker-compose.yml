services:
  backend:
    build: ./backend
    environment:
      PORT: 4000
      DATABASE_PATH: /app/data/document-audits.sqlite
      CLIENT_ORIGIN: http://localhost:8080
      AUTH_SECRET: change-this-for-production
      MAIL_DRY_RUN: "true"
      NOTIFICATIONS_ENABLED: "true"
      NOTIFICATION_CHECK_INTERVAL_MINUTES: 60
    volumes:
      - audit-data:/app/data
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  audit-data:
